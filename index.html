<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify · Relay Risk Tools</title>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="page-header">
    <div class="brand-row">
      <span class="brand-wordmark" aria-label="Relay">RELAY</span>
      <span class="brand-divider" aria-hidden="true"></span>
      <span class="tool-name">Risk Tools</span>
    </div>
    <div class="title-row">
      <h1 class="page-title">Verify</h1>
      <p class="page-subtitle">
       AI image verification.
        Negatives do not gurantee that an image is real.
      </p>
    </div>
  </header>

  <main class="page-main">
    <section id="dropZone" class="upload-zone" aria-label="Upload selfies">
      <input
        type="file"
        id="fileInput"
        accept="image/png,image/jpeg,image/webp"
        multiple
        hidden
      />
      <label for="fileInput" class="upload-label">
        <i class="ph ph-cloud-arrow-up upload-icon" aria-hidden="true"></i>
        <div class="upload-prompt">
          Drop selfies here, or <span class="upload-link">click to choose files</span>
        </div>
        <div class="upload-hint">Multiple images supported &middot; PNG, JPEG, WEBP</div>
      </label>
    </section>

    <section id="bootStatus" class="boot-status" role="status" aria-live="polite">
      <span class="boot-dot" id="bootDot" aria-hidden="true"></span>
      <span id="bootText">Loading verification engine&hellip;</span>
    </section>

    <section
      id="results"
      class="results"
      aria-live="polite"
      aria-label="Verification results"
    ></section>
  </main>

  <template id="resultCardTemplate">
    <article class="result-card" data-state="processing" data-kind="pending">
      <div class="result-accent" aria-hidden="true"></div>
      <header class="result-header">
        <div class="result-filename"></div>
      </header>
      <div class="result-body">
        <div class="result-preview">
          <div class="result-preview-frame">
            <img class="result-preview-img" alt="" />
            <div class="result-preview-empty">
              <i class="ph ph-image" aria-hidden="true"></i>
              <span>No masked image</span>
            </div>
          </div>
          <button class="btn btn-primary result-download" disabled aria-label="Download masked image">
            <i class="ph ph-download-simple" aria-hidden="true"></i>
            <span class="result-download-label">Download masked image</span>
          </button>
        </div>
        <div class="result-details">
          <div class="verdict-card"></div>
          <div class="manual-links hidden" aria-label="Manual cross-check links">
            <div class="manual-links-label">
              <strong>Check the masked image on BOTH services</strong> — each detects different AI providers, so a single source is not enough.
            </div>
            <ol class="manual-links-list">
              <li>
                <a class="link-strong" href="https://openai.com/research/verify" target="_blank" rel="noopener">
                  <strong>OpenVerify</strong>
                  <i class="ph ph-arrow-square-out" aria-hidden="true"></i>
                </a>
                <span> &mdash; drop the masked image into the upload area</span>
              </li>
              <li>
                <a class="link-strong" href="https://gemini.google.com" target="_blank" rel="noopener">
                  <strong>Gemini</strong>
                  <i class="ph ph-arrow-square-out" aria-hidden="true"></i>
                </a>
                <span> &mdash; attach the masked image and ask &ldquo;use SynthID verification on this image&rdquo;</span>
              </li>
            </ol>
          </div>
          <details class="result-c2pa">
            <summary>C2PA details</summary>
            <pre class="result-c2pa-json"></pre>
          </details>
        </div>
      </div>
    </article>
  </template>

  <script type="module" src="app.js"></script>
</body>
</html>
